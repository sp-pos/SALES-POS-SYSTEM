<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales POS System</title>

    <!-- Bengali Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Inter:wght@100..900&display=swap" rel="stylesheet">

    <script src="skiko.js"></script>
    <style>
        html, body {
            width: 100%;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #F8F9FA;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
        }
        #composeApp {
            width: 100%;
            height: 100%;
        }
        /* Loader while app initializes */
        .loader-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #000000;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin-bottom: 15px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div id="loader" class="loader-container">
        <div class="loader"></div>
        <p>Loading POS System...</p>
    </div>

    <script src="composeApp.js"></script>

    <script>
        // Remove loader when app starts
        window.onload = function() {
            setTimeout(function() {
                var loader = document.getElementById('loader');
                if (loader) loader.style.display = 'none';
            }, 2000);
        };
    </script>
</body>
</html>
