<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SP POS System</title>

    <!-- Link to Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        html, body {
            width: 100%; height: 100%; margin: 0; padding: 0; overflow: hidden;
            background-color: #F8F9FA;
            font-family: 'Inter', 'Hind Siliguri', sans-serif;
        }
        #composeApp { width: 100%; height: 100%; outline: none; }
        .loading-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            background: white; z-index: 1000;
            transition: opacity 0.3s ease-out;
        }
        .loading-container.hidden { opacity: 0; pointer-events: none; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #f3f3f3;
            border-top: 4px solid #000; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="loader" class="loading-container">
        <div class="spinner"></div>
        <p style="margin-top: 20px; font-weight: 600;">SP POS INITIALIZING...</p>
    </div>

    <canvas id="composeApp"></canvas>

    <script src="skiko.js"></script>
    <script src="composeApp.js"></script>

    <script>
        window.hideLoader = function() {
            const loader = document.getElementById('loader');
            if (loader) {
                loader.classList.add('hidden');
                setTimeout(() => loader.remove(), 300);
            }
        };
        // Auto-hide fallback
        setTimeout(() => window.hideLoader?.(), 5000);
    </script>
</body>
</html>
